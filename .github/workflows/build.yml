name: Build SoccerLegacy APK

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout your repo ──────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Gradle) ───────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Android SDK & NDK ───────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ── 4. Make Gradle wrapper executable ─────────────────────
      - name: Grant Gradle Execute Permission
        run: chmod +x gradlew

      # ── 5. Build the Debug APK ─────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Upload APK as downloadable artifact ─────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SoccerLegacy-v0.01-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
