name: "Build Soccer Legacy APK"
on: [push]

jobs:
  export_android:
    runs-on: ubuntu-latest
    name: Export Android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

            # REMOVE the Generate Debug Keystore step entirely
    
      - name: Manual Godot Export
        run: |
          # Create the builds directory
          mkdir -p builds/Android
          
          # Run the export with forced keystore arguments
          /home/runner/.local/share/godot/godot_executable/Godot_v4.2.1-stable_linux.x86_64 \
            --headless \
            --path ./ \
            --export-debug "Android" ./builds/Android/SoccerLegacy.apk \
            --v \
            "res://debug.keystore" \
            "androiddebugkey" \
            "android"

      - name: Zip Result
        run: |
          zip -r SoccerLegacy.zip builds/Android/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoccerLegacy-v0.01
          path: SoccerLegacy.zip
