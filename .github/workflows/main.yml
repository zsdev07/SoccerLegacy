name: "Build Soccer Legacy APK"
on: [push]

jobs:
  export_android:
    runs-on: ubuntu-latest
    name: Export Android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Godot Android Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          export_debug: true
        env:
          # THIS IS THE KEY: Godot's built-in env variables for headless export
          GODOT_ANDROID_DEBUG_KEYSTORE_PATH: "debug.keystore"
          GODOT_ANDROID_DEBUG_KEYSTORE_USER: "androiddebugkey"
          GODOT_ANDROID_DEBUG_KEYSTORE_PASS: "android"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoccerLegacy-APK
          path: /home/runner/.local/share/godot/archives/*.zip
